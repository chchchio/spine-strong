    <div class="section-title">Getting Stronger</div>${charts.length?charts.map(([id,pts])=>{const cur=pts[pts.length-1].w,f=pts[0].w,dl=cur-f;return `<div class="card wchart"><div class="wlabel"><span class="wname">${NAMES[id]||id}</span><span class="wcur">${cur} lb</span></div>${spark(pts)}<div class="wmeta">${pts.length} sessions · ${dl>0?'<span class="up">▲ +'+dl+' lb since you started</span>':'first session'}</div></div>`;}).join(''):'<div class="card" style="text-align:center;color:var(--muted);padding:24px">Log sessions to see strength curves.</div>'}`;
}
function heatCells(){const t=SS.todayISO();const dates=new Set(Object.values(SS.model.log).map(s=>s.date));let h='';for(let i=13;i>=0;i--){const d=SS.addDays(t,-i);h+=`<div class="hcell ${dates.has(d)?'train':''}"></div>`;}return h;}
function spark(pts,w=260,h=40){if(pts.length<2){return `<svg class="spark" viewBox="0 0 ${w} ${h}"><circle cx="${w}" cy="${h/2}" r="3" fill="var(--accent)"/></svg>`;}
  const ws=pts.map(p=>p.w),mn=Math.min(...ws),mx=Math.max(...ws),rg=(mx-mn)||1;const P=pts.map((p,i)=>[(i/(pts.length-1))*w,h-5-((p.w-mn)/rg)*(h-10)]);const d=P.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');const l=P[P.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d} L ${w} ${h} L 0 ${h} Z" fill="rgba(212,243,74,0.1)"/><path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/><circle cx="${l[0].toFixed(1)}" cy="${l[1].toFixed(1)}" r="3.5" fill="var(--accent)"/></svg>`;}


function colorClass(p){
  if(p.status==='done')return 'done';
  if(p.type!=='rest' && p.source==='user')return 'mine';   // your placed/moved session
  if(p.type!=='rest')return 'suggest';                      // rhythm-suggested session
  if(p.sport)return 'sport';
  return 'rest';
}
function renderWeek(){
  const el=document.getElementById('week');
  const today=SS.todayISO();
  const start=SS.addDays(today,-1); // show from yesterday so a done/missed day is visible
  const plan=SS.buildPlan(start,9);
  el.innerHTML=`<div class="logo">SpineStrong · Week</div><h1>Your Plan</h1>
    <div class="sub">Tap any day to adjust. Colours show where each day comes from.</div>
    <div class="legend">
      <div class="lg"><span class="lgdot suggest"></span>Suggested by your rhythm</div>
      <div class="lg"><span class="lgdot mine"></span>Your choice</div>
      <div class="lg"><span class="lgdot sport"></span>Sport</div>
      <div class="lg"><span class="lgdot done"></span>Done · locked</div>
    </div>
    <div class="hint">👉 Try: tap a <b>Suggested</b> day → "Move" or "Mark sport". Watch it turn <b>green</b> (your choice) and see the change summary. Then check Setup to change your rhythm with a preview.</div>
    ${plan.map(p=>dayRow(p,today)).join('')}`;
  el.querySelectorAll('[data-day]').forEach(d=>d.onclick=()=>openSheet(d.dataset.day));
}
function dayRow(p,today){
  const cc=colorClass(p);
  const isToday=p.date===today;
  let typeLabel;
  if(p.status==='done')typeLabel=TYPE_SHORT[p.type]+' ✓';
  else if(p.type!=='rest')typeLabel=TYPE_SHORT[p.type];   // any real session (placed or suggested)
  else if(p.sport)typeLabel=SPORT_ICON[p.sport]+' '+p.sport.charAt(0).toUpperCase()+p.sport.slice(1);
  else typeLabel='Rest';
  const lock=p.source==='user'&&p.type!=='rest'?' <span class="locki">🔒</span>':'';
  return `<div class="day ${cc} ${isToday?'today':''}" data-day="${p.date}">
    <div class="stripe"></div>
    <div class="dayinner">
      <div class="daydate"><div class="dn">${DAYS[new Date(p.date+'T00:00:00').getDay()]}</div><div class="dd">${new Date(p.date+'T00:00:00').getDate()}</div></div>
      <div class="daymid">
        <div class="daytype">${typeLabel}${lock} ${isToday?'<span class="daytoday-badge">· Today</span>':''}</div>
        <div class="dayreason"><span class="reasontag ${cc}"></span>${p.reason||''}</div>
      </div>
      <div class="daychev">›</div>
    </div></div>`;
}
function openSheet(date){
  const plan=SS.buildPlan(date,1)[0];
  const sheet=document.getElementById('sheet'),bd=document.getElementById('backdrop');
  const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(date+'T00:00:00').getDay()];
  let body='';
  if(plan.status==='done'){
    body=`<div class="act"><span class="ai">✓</span><div class="at">Completed session<div class="ad">Locked in your history — edit in Progress to fix a logged weight</div></div></div>
      <div class="act"><span class="ai">🔓</span><div class="at" data-act="unlock|${date}">Un-complete this session<div class="ad">If you marked it done by mistake</div></div></div>`;
  } else if(plan.sport){
    body=`<div class="act" data-act="unsport|${date}"><span class="ai">↩</span><div class="at">Remove ${plan.sport}<div class="ad">Back to a normal day</div></div></div>`;
  } else if(plan.type!=='rest'){
    body=`<div class="act primary" data-act="done|${date}"><span class="ai">▶</span><div class="at">Do this session<div class="ad">Mark it complete and lock it in</div></div></div>
      <div class="submenu"><div class="smt">Move this session — keeps your rotation order</div><div class="smrow"><button data-act="one1|${date}">+1 day</button><button data-act="one2|${date}">+2 days</button></div></div>
      <div class="submenu"><div class="smt">Push the whole plan forward</div><div class="smrow"><button data-act="chain1|${date}">+1 day</button><button data-act="chain2|${date}">+2 days</button></div></div>
      <div class="act" data-act="sportmenu|${date}"><span class="ai">🎾</span><div class="at">I played a sport instead<div class="ad">Squash or golf — your session moves forward</div></div></div>
      <div class="act" data-act="busy|${date}"><span class="ai">🚫</span><div class="at">Mark busy / skip<div class="ad">No training this day</div></div></div>`;
  } else {
    body=`<div class="act primary" data-act="trainmenu|${date}"><span class="ai">💪</span><div class="at">Train today instead<div class="ad">Pick a session — a later one shifts to keep your rhythm</div></div></div>
      <div class="act" data-act="sportmenu|${date}"><span class="ai">🎾</span><div class="at">Add a sport this day</div></div>
      <div class="act" data-act="busy|${date}"><span class="ai">🚫</span><div class="at">Mark unavailable</div></div>`;
    if(SS.model.overrides[date]){body+=`<div class="act" data-act="clear|${date}"><span class="ai">↩</span><div class="at">Reset to suggested<div class="ad">Remove my change, use the rhythm</div></div></div>`;}
  }
  sheet.innerHTML=`<div class="grab"></div><h3>${dn} ${new Date(date+'T00:00:00').getDate()}</h3>
    <div class="sh-sub">${plan.reason||''}</div>${body}`;
  sheet.classList.add('show');bd.classList.add('show');
  sheet.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>doAct(b.dataset.act));
}
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('backdrop').classList.remove('show');}
function doAct(spec){
  const [a,date]=spec.split('|');
  if(a==='sportmenu'){ showSportMenu(date); return; }
  if(a==='trainmenu'){ showTrainMenu(date); return; }
  snap();
  const before=SS.buildPlan(SS.addDays(SS.todayISO(),-1),9);
  if(a==='done'){SS.logSession(SS.getTypeFor(date),[{id:'chest_supported_row',_weight:50,_sets:[true,true,true]}],{date});}
  if(a==='busy')SS.markBusy(date);
  if(a==='one1')SS.pushSessionForward(date,1);
  if(a==='one2')SS.pushSessionForward(date,2);
  if(a==='chain1')SS.pushChainForward(date,1);
  if(a==='chain2')SS.pushChainForward(date,2);
  if(a==='clear'||a==='unsport'||a==='unlock')SS.clearOverride(date);
  if(a==='unlock'){ // also remove the log
    const id=Object.entries(SS.model.log).find(([i,s])=>s.date===date); if(id){delete SS.model.log[id[0]];localStorage.setItem('spinestrong_v1',JSON.stringify(SS.model));}
  }
  closeSheet();
  const after=SS.buildPlan(SS.addDays(SS.todayISO(),-1),9);
  showSummary(diffPlans(before,after));
  renderWeek();
}
function showSportMenu(date){
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="grab"></div><h3>Which sport?</h3><div class="sh-sub">Your training session will move forward, keeping rotation.</div>
    <div class="act" data-sp="squash|${date}"><span class="ai">🎾</span><div class="at">Squash</div></div>
    <div class="act" data-sp="golf|${date}"><span class="ai">⛳</span><div class="at">Golf</div></div>`;
  sheet.querySelectorAll('[data-sp]').forEach(b=>b.onclick=()=>{
    const[sp,d]=b.dataset.sp.split('|');snap();
    const before=SS.buildPlan(SS.addDays(SS.todayISO(),-1),9);
    const hadTraining=SS.getTypeFor(d)!=='rest';
    if(hadTraining)SS.pushSessionForward(d,2); // move the session, then
    SS.markSport(d,sp);
    closeSheet();
    const after=SS.buildPlan(SS.addDays(SS.todayISO(),-1),9);
    showSummary(diffPlans(before,after));renderWeek();
  });
}
function showTrainMenu(date){
  const sheet=document.getElementById('sheet');
  const nextType=SS.nextRotationType?SS.nextRotationType():'upper_a';
  const types=[['upper_a','Upper A — Shoulders & Back'],['upper_b','Upper B — Push & Arms'],['lower','Lower — Glute & Ham']];
  sheet.innerHTML=`<div class="grab"></div><h3>Train on ${shortD(date)}</h3><div class="sh-sub">Pick a session type.</div>
    ${types.map(([t,n])=>`<div class="act ${t===nextType?'primary':''}" data-tt="${t}|${date}"><span class="ai">${t==='lower'?'🦵':(t==='upper_b'?'💪':'🏋️')}</span><div class="at">${n}${t===nextType?'<div class="ad">⭐ Next in your rotation</div>':''}</div></div>`).join('')}
    <div class="toggle-row"><div><div class="tg-lbl">Update order forward</div><div class="tg-desc">On: re-sequences your whole plan to keep rotation. Off: just a one-off bonus, plan unchanged.</div></div><div class="switch on" id="cascadeTog"><div class="knob"></div></div></div>`;
  let cascade=true;
  const tog=sheet.querySelector('#cascadeTog');
  tog.onclick=()=>{cascade=!cascade;tog.classList.toggle('on',cascade);};
  sheet.querySelectorAll('[data-tt]').forEach(b=>b.onclick=()=>{
    const[t,d]=b.dataset.tt.split('|');snap();
    const before=SS.buildPlan(SS.addDays(SS.todayISO(),-1),16);
    SS.insertSession(d,t,cascade);
    closeSheet();
    const after=SS.buildPlan(SS.addDays(SS.todayISO(),-1),16);
    showSummary(diffPlans(before,after));renderWeek();
  });
}
function diffPlans(before,after){
  const out=[];
  const byDateB={},byDateA={};
  before.forEach(p=>byDateB[p.date]=p);after.forEach(p=>byDateA[p.date]=p);
  const dates=[...new Set([...before.map(p=>p.date),...after.map(p=>p.date)])].sort();
  dates.forEach(d=>{
    const b=byDateB[d],a=byDateA[d];if(!b||!a)return;
    const bl=label(b),al=label(a);
    if(bl!==al)out.push(`${shortD(d)}: ${bl} → ${al}`);
  });
  return out;
}
function label(p){if(p.status==='done')return TYPE_SHORT[p.type]+' done';if(p.sport)return SPORT_ICON[p.sport]+p.sport;if(p.type!=='rest')return TYPE_SHORT[p.type];return 'Rest';}
function shortD(iso){const d=new Date(iso+'T00:00:00');return DAYS[d.getDay()]+' '+d.getDate();}
function snap(){snapshot=SS.exportData();}
function showSummary(lines){
  const s=document.getElementById('summary');
  document.getElementById('sumlist').innerHTML = lines.length?lines.join('<br>'):'No other days affected.';
  s.classList.add('show');clearTimeout(window._st);window._st=setTimeout(()=>s.classList.remove('show'),7000);
}
function renderSetup(){
  const el=document.getElementById('setup');const p=SS.prefs;const order=[1,2,3,4,5,6,0];
  const SPORTS=[['squash','🎾 Squash'],['golf','⛳ Golf'],['other','🏃 Other']];
  el.innerHTML=`<div class="logo">SpineStrong · Setup</div><h1>Your Normal Rhythm</h1>
    <div class="sub">This is your usual pattern. Changes to days/sessions preview before they apply.</div>
    ${pendingPatch?previewBanner():''}
    <div class="section-title">Training Rhythm</div>
    <div class="card">
      <div class="prow"><div><div class="plbl">Sessions per week</div><div class="pdesc">Your weekly target.</div></div><div class="stepper"><button data-st="spw|-1">−</button><span class="val">${(pendingPatch&&pendingPatch.sessionsPerWeek)||p.sessionsPerWeek}</span><button data-st="spw|1">+</button></div></div>
      <div class="prow" style="display:block"><div><div class="plbl">Preferred training days</div><div class="pdesc">Tap to change — you'll see what it does before applying.</div></div>
        <div class="daypills">${order.map(d=>{const days=(pendingPatch&&pendingPatch.preferredDays)||p.preferredDays;return `<div class="daypill ${days.includes(d)?'on':''}" data-day="${d}">${DAYS[d][0]}</div>`;}).join('')}</div></div>
      <div class="prow"><div><div class="plbl">Min rest between sessions</div><div class="pdesc">Days off kept between training days.</div></div><div class="stepper"><button data-st="rest|-1">−</button><span class="val">${p.minRestDays}</span><button data-st="rest|1">+</button></div></div>
    </div>
    <div class="section-title">Recurring Sport Days</div>
    <div class="card">
      <div id="sportLines">${(p.recurringSports||[]).map((rs,i)=>`<div class="sportline"><select data-si="${i}|sport">${SPORTS.map(s=>`<option value="${s[0]}" ${rs.sport===s[0]?'selected':''}>${s[1]}</option>`).join('')}</select><span class="every">every</span><select data-si="${i}|day">${order.map(d=>`<option value="${d}" ${rs.day===d?'selected':''}>${DAYS[d]}</option>`).join('')}</select><button class="del" data-del="${i}">×</button></div>`).join('')||'<div style="font-size:12px;color:var(--muted);padding:4px 0">No recurring sports yet.</div>'}</div>
      <button class="addsport" data-add>+ Add a recurring sport</button>
      <div class="prow" style="margin-top:6px"><div><div class="plbl">Keep day before sport lighter</div><div class="pdesc">No hard training the day before squash or golf.</div></div><div class="switch ${p.noTrainDayBeforeSport?'on':''}" data-tog="dbs"><div class="knob"></div></div></div>
    </div>
    <div class="section-title">Coming Back / Time Off</div>
    <div class="card">
      <div class="prow"><div><div class="plbl">Ease back in after time off</div><div class="pdesc">After ~10+ days off, first session is lighter to protect your back.</div></div><div class="switch ${p.easeInOnReturn?'on':''}" data-tog="ease"><div class="knob"></div></div></div>
      <button class="pausebtn ${p.paused?'paused':''}" data-pause style="margin-top:12px">${p.paused?'Resume my plan':'Pause my plan'}</button>
      <div style="font-size:11.5px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.4">${p.paused?'Paused — resume whenever, your progress is saved.':'Going away? Pause stops the plan until you\u2019re back, no guilt.'}</div>
    </div>`;
  el.querySelectorAll('[data-st]').forEach(b=>b.onclick=()=>{const[k,d]=b.dataset.st.split('|');
    if(k==='spw')stageChange({sessionsPerWeek:Math.max(1,Math.min(6,((pendingPatch&&pendingPatch.sessionsPerWeek)||p.sessionsPerWeek)+ +d))});
    else { SS.setPrefs({minRestDays:Math.max(0,Math.min(3,p.minRestDays+ +d))}); renderSetup(); }});
  el.querySelectorAll('[data-day]').forEach(e=>e.onclick=()=>{const d=+e.dataset.day;const cur=((pendingPatch&&pendingPatch.preferredDays)||p.preferredDays).slice();const nd=cur.includes(d)?cur.filter(x=>x!==d):[...cur,d].sort();stageChange({preferredDays:nd});});
  el.querySelectorAll('[data-si]').forEach(s=>s.onchange=()=>{const[i,f]=s.dataset.si.split('|');const rs=SS.prefs.recurringSports.slice();rs[+i]=Object.assign({},rs[+i],{[f]:f==='day'?+s.value:s.value});SS.setPrefs({recurringSports:rs});renderSetup();});
  el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{SS.removeRecurringSport(+b.dataset.del);renderSetup();});
  const add=el.querySelector('[data-add]'); if(add)add.onclick=()=>{SS.addRecurringSport('squash',2);renderSetup();};
  el.querySelectorAll('[data-tog]').forEach(t=>t.onclick=()=>{const k=t.dataset.tog;if(k==='dbs')SS.setPrefs({noTrainDayBeforeSport:!SS.prefs.noTrainDayBeforeSport});else SS.setPrefs({easeInOnReturn:!SS.prefs.easeInOnReturn});renderSetup();});
  const pb=el.querySelector('[data-pause]'); if(pb)pb.onclick=()=>{SS.prefs.paused?SS.resumePlan():SS.pausePlan();renderSetup();};
}
function stageChange(patch){pendingPatch=Object.assign({},pendingPatch,patch);renderSetup();}
function previewBanner(){
  const diffs=SS.previewPrefsChange(pendingPatch,14);
  return `<div class="preview"><h4>👁 Preview — here's what changes</h4>
    ${diffs.length?diffs.slice(0,6).map(d=>`<div class="pvline"><span class="pvd">${shortD(d.date)}</span>${d.before}<span class="arrow">→</span><b>${d.after}</b></div>`).join(''):'<div class="pvline">No changes to your upcoming days.</div>'}
    ${diffs.length>6?`<div class="pvline" style="color:var(--muted)">+ ${diffs.length-6} more days</div>`:''}
    <div class="pvbtns"><button data-pv="cancel">Cancel</button><button data-pv="next" class="primary">Apply from next week</button><button data-pv="now" class="primary">Apply now</button></div></div>`;
}

function weekStreak(){return Math.max(1,Object.keys(SS.model.log).length);}


document.getElementById('undobtn').onclick=()=>{if(snapshot){SS.importData(snapshot);snapshot=null;renderWeek();}document.getElementById('summary').classList.remove('show');};
document.getElementById('backdrop').onclick=closeSheet;
document.addEventListener('click',e=>{const pv=e.target.closest('[data-pv]');if(!pv)return;const choice=pv.dataset.pv;if(choice==='cancel'){pendingPatch=null;renderSetup();return;}snap();if(choice==='now'||choice==='next'){SS.setPrefs(pendingPatch);pendingPatch=null;renderSetup();showSummary(['Rhythm updated — your week reflects the new pattern.']);}});
document.querySelectorAll('[data-nav]').forEach(n=>n.onclick=()=>nav(n.dataset.nav));

renderToday();

</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body></html>
