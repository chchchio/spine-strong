<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>SpineStrong</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
  :root{--bg:#0F1115;--card:#1A1D23;--border:#2A2D35;--muted:#6B7280;--text:#E8EAF0;--accent:#D4F34A;--core:#7DD3FC;--muscle:#F2666B;--warn:#F59E0B;--sport:#c0a8ff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:"DM Sans",-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{max-width:520px;margin:0 auto;padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 80px) 14px;}
  .screen{display:none;}.screen.active{display:block;}
  header{padding:16px 0 6px;}
  .logo{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;}
  h1{font-size:21px;font-weight:600;margin:3px 0 2px;letter-spacing:-0.4px;}
  .sub{color:var(--muted);font-size:13px;}
  .section-title{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:20px 2px 9px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:11px;}
  /* nav */
  .navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,21,0.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;max-width:520px;margin:0 auto;padding:8px 0 calc(env(safe-area-inset-bottom) + 8px);z-index:50;}
  .navitem{flex:1;text-align:center;font-size:10px;color:var(--muted);font-weight:600;padding:4px;cursor:pointer;}
  .navitem.active{color:var(--accent);}.navitem .ic{font-size:16px;display:block;margin-bottom:3px;}
  /* TODAY */
  .progress-strip{display:flex;gap:4px;margin:10px 0 4px;}
  .pdot{flex:1;height:4px;border-radius:2px;background:#23272f;}.pdot.done{background:var(--accent);}
  .ex{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:11px;overflow:hidden;}
  .ex.core{border-color:#274152;}
  .ex-head{display:flex;align-items:center;gap:11px;padding:14px;cursor:pointer;}
  .ex-num{flex-shrink:0;width:26px;height:26px;border-radius:8px;background:#23272f;color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .ex.done .ex-num{background:var(--accent);color:#0F1115;}
  .ex-headinfo{flex:1;}.ex-badge{font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:5px;text-transform:uppercase;display:inline-block;margin-bottom:3px;}
  .ex-badge.core{background:#274152;color:var(--core);}.ex-badge.lift{background:#2A2D35;color:var(--accent);}
  .ex-name{font-size:14.5px;font-weight:600;line-height:1.2;}.ex-sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .chev{color:var(--muted);font-size:12px;transition:.2s;}.ex.open .chev{transform:rotate(180deg);}
  .ex-body{display:none;padding:0 14px 14px;}.ex.open .ex-body{display:block;}
  .rx{display:flex;background:linear-gradient(180deg,#0e1216,#0a0d11);border:1px solid #232830;border-radius:12px;margin-bottom:13px;overflow:hidden;}
  .rxitem{flex:1;padding:9px 4px 8px;text-align:center;position:relative;}
  .rxitem+.rxitem::before{content:"";position:absolute;left:0;top:20%;height:60%;width:1px;background:#262b34;}
  .rxk{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:800;margin-bottom:3px;color:#7c8595;}
  .rxv{font-size:14px;font-weight:800;color:var(--text);line-height:1;}.rxu{font-size:8px;color:var(--muted);margin-left:1px;font-weight:700;}
  .rxitem.s .rxv,.rxitem.r .rxv{color:#9fb8ff;}.rxitem.t .rxv{color:#c0a8ff;font-size:12.5px;}.rxitem.k .rxv{color:#ffc98a;}
  .rxitem.w{background:radial-gradient(120% 140% at 50% 0%,rgba(212,243,74,0.18),transparent 60%);}
  .rxitem.w .rxk{color:#b8d44a;}.rxitem.w .rxv{color:var(--accent);text-shadow:0 0 14px rgba(212,243,74,0.55);font-size:15px;}
  .imgwell{background:#fff;border:1px solid #20242c;border-radius:11px;padding:6px;overflow:hidden;min-height:90px;}
  .imgwell img{width:100%;display:block;border-radius:6px;}
  .movedesc{font-size:12.5px;line-height:1.55;color:#cfd3dc;background:#0c0f13;border:1px solid #20242c;border-radius:11px;padding:11px 13px;margin-top:9px;}
  .logblock{margin-top:13px;background:#0c0f13;border:1px solid #20242c;border-radius:11px;padding:13px;}
  .logtop{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .wt{display:flex;align-items:center;gap:7px;}.wt label{font-size:11px;color:var(--muted);font-weight:600;}
  .wt input{width:54px;background:#12161c;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px;font-size:16px;text-align:center;font-family:inherit;}
  .setdots{display:flex;align-items:center;gap:6px;}.setdots .sl{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;}
  .setdot{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;}
  .setdot.done{background:var(--accent);color:#0F1115;border-color:var(--accent);}
  .timer{display:flex;align-items:center;gap:11px;margin-top:12px;padding-top:12px;border-top:1px solid #20242c;}
  .ring{position:relative;width:42px;height:42px;flex-shrink:0;}.ring svg{transform:rotate(-90deg);}
  .tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .tinfo{flex:1;}.tlabel{font-size:12px;font-weight:600;}.tsub{font-size:10.5px;color:var(--muted);}
  .tbtn{background:var(--accent);color:#0F1115;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .donebtn{width:100%;margin-top:12px;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:10px;padding:11px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .ex.done .donebtn{background:var(--accent);color:#0F1115;}
  .mmap{display:flex;gap:12px;align-items:center;background:#0c0f13;border:1px solid #20242c;border-radius:11px;padding:10px 13px;margin-top:9px;}
  .mmap-info{flex:1;}.mmap-ttl{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px;}.mmap-p{font-size:12px;font-weight:700;color:var(--muscle);}
  .caps{margin-top:9px;display:flex;flex-direction:column;gap:6px;}.cap{display:flex;gap:8px;font-size:12px;line-height:1.4;}.cap .k{flex-shrink:0;width:48px;font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;padding-top:1px;}.cap.setup .k{color:#9aa3b2;}.cap.focus .k{color:var(--accent);}.cap .v{color:#cfd3dc;}
  .disc{display:flex;gap:7px;font-size:11px;line-height:1.4;padding:8px 11px;border-radius:8px;margin-top:9px;background:#13201a;color:#9fd9a0;}
  .last{font-size:11px;color:var(--muted);margin-top:9px;}.last b{color:var(--accent);}
  .vbtn{display:flex;align-items:center;gap:8px;background:#1f2024;border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-top:12px;font-size:12.5px;font-weight:600;color:var(--text);text-decoration:none;}.vbtn .rt{color:#ff4444;}.vbtn .arr{margin-left:auto;color:var(--muted);}
  .savetag{display:flex;align-items:center;gap:7px;justify-content:center;font-size:11.5px;color:#9fd9a0;background:#13201a;border:1px solid #1f3a28;border-radius:10px;padding:9px;margin-bottom:11px;}
  /* WEEK */
  .weekhead{display:flex;align-items:flex-end;justify-content:space-between;}
  .weeknav{display:flex;gap:6px;align-items:center;}
  .weeknav button{background:var(--card);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:9px;font-size:14px;cursor:pointer;}
  .weeknav .wlabel{font-size:11px;color:var(--muted);min-width:40px;text-align:center;}
  .wsummary{display:flex;gap:9px;margin:14px 0;}
  .wstat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px;text-align:center;}
  .wstat .wv{font-size:19px;font-weight:800;color:var(--accent);}.wstat .wl{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;}
  .strip{display:flex;gap:5px;margin-bottom:14px;}
  .scol{flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px 2px 8px;text-align:center;cursor:pointer;}
  .scol.today{border-color:var(--accent);background:#181d10;}.scol.active{box-shadow:0 0 0 1px var(--core);border-color:var(--core);}
  .scol .sdn{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;}.scol .sdd{font-size:15px;font-weight:800;margin:1px 0 4px;}
  .scol .sicon{font-size:15px;height:18px;line-height:18px;}.donebadge{display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#0F1115;font-size:11px;font-weight:800;line-height:16px;}
  .detail{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;}.detail.sport{border-color:#332b52;}
  .dhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}.dtitle{font-size:16px;font-weight:600;}
  .dstatus{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:6px;}
  .dstatus.done{background:#1f3320;color:var(--accent);}.dstatus.today{background:#181d10;color:var(--accent);border:1px solid var(--accent);}
  .dstatus.sched{background:#23272f;color:var(--muted);}.dstatus.rest{background:#23272f;color:var(--muted);}.dstatus.busy{background:#332417;color:var(--warn);}
  .dsub{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .exline{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#cfd3dc;padding:7px 0;border-bottom:1px solid #20242c;}.exline:last-child{border:none;}
  .exline .ed{width:6px;height:6px;border-radius:50%;background:var(--accent);}.exline .ed.core{background:var(--core);}
  .actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}
  .actions button{flex:1;min-width:calc(50% - 4px);border-radius:9px;padding:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);}
  .actions button.primary{background:var(--accent);color:#0F1115;border-color:var(--accent);}.actions button.warn{border-color:var(--warn);color:var(--warn);}
  .sportrow{display:flex;align-items:center;gap:8px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);}
  .sportrow .sl{font-size:12px;color:var(--muted);flex:1;}.sporttog{display:flex;gap:6px;}
  .sporttog button{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;}
  .sporttog button.on{background:#2a2440;border-color:var(--sport);color:var(--sport);}
  .movegrid{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .movelabel{font-size:11.5px;color:var(--muted);margin-bottom:9px;line-height:1.4;}
  .moverow{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
  .moverow .mt{flex:1;font-size:12px;font-weight:600;}
  .moverow button{background:#12161c;border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}
  .skiplink{background:none;border:none;color:var(--muted);font-size:11px;text-decoration:underline;cursor:pointer;font-family:inherit;margin-top:4px;padding:4px 0;}
  .skipnote{font-size:11.5px;color:var(--muted);background:#13161b;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
  .gear{font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;}
  /* PROGRESS */
  .coach{background:linear-gradient(135deg,rgba(212,243,74,0.12),rgba(212,243,74,0.03));border:1px solid #2f3a1a;border-radius:13px;padding:13px 15px;margin:12px 0;font-size:13px;line-height:1.5;color:#e8f0c9;}.coach b{color:var(--accent);}
  .hero{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:11px;}
  .streak{text-align:center;padding-right:14px;border-right:1px solid var(--border);}.streak .big{font-size:34px;font-weight:800;color:var(--accent);line-height:1;}.streak .lab{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;}
  .heat{flex:1;}.heat .ht{font-size:11px;color:var(--muted);margin-bottom:8px;}.heatgrid{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;}
  .hcell{aspect-ratio:1;border-radius:2px;background:#23272f;}.hcell.train{background:var(--accent);}
  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:11px;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 8px;text-align:center;}.stat .v{font-size:22px;font-weight:800;}.stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:5px;}.stat.accent .v{color:var(--accent);}
  .backcard{display:flex;align-items:center;gap:12px;background:#13201a;border:1px solid #1f3a28;border-radius:13px;padding:13px 15px;}
  .backcard .shield{font-size:22px;}.backcard .bt{font-size:13px;font-weight:700;color:#9fd9a0;}.backcard .bs{font-size:11.5px;color:#7fae84;margin-top:2px;line-height:1.4;}
  .vbar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}.vbar-row .vname{font-size:12px;width:74px;color:#cfd3dc;}.vbar-track{flex:1;height:9px;background:#23272f;border-radius:5px;overflow:hidden;}.vbar-fill{height:100%;border-radius:5px;}.vbar-row .vpct{font-size:11px;color:var(--muted);width:30px;text-align:right;}
  .wchart{margin-bottom:11px;}.wlabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}.wname{font-size:13px;font-weight:600;}.wcur{font-size:12px;color:var(--accent);font-weight:700;}.spark{width:100%;height:40px;}.wmeta{font-size:10.5px;color:var(--muted);margin-top:3px;}.wmeta .up{color:var(--accent);}
  /* PREFS */
  .prow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}.prow:first-child{padding-top:0;}.prow:last-child{border-bottom:none;padding-bottom:0;}
  .plbl{font-size:13.5px;font-weight:600;}.pdesc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4;}
  .stepper{display:flex;align-items:center;gap:8px;}.stepper button{width:27px;height:27px;border-radius:8px;border:1px solid var(--border);background:#12161c;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;}.stepper .val{font-size:14px;font-weight:700;min-width:18px;text-align:center;}
  .daypills{display:flex;gap:5px;margin-top:10px;}.daypill{flex:1;text-align:center;padding:9px 0;border-radius:9px;border:1px solid var(--border);background:#12161c;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;}.daypill.on{background:var(--accent);color:#0F1115;border-color:var(--accent);}
  .switch{width:46px;height:27px;border-radius:20px;background:#33363f;position:relative;transition:.2s;cursor:pointer;}.switch.on{background:var(--accent);}.knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}.switch.on .knob{left:22px;}
  .sportline{display:flex;align-items:center;gap:8px;margin-bottom:9px;}.sportline select{flex:1;background:#12161c;border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px;font-size:13px;font-family:inherit;-webkit-appearance:none;}.sportline .every{font-size:12px;color:var(--muted);}.sportline .del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
  .addsport{width:100%;background:#12161c;border:1px dashed var(--border);color:var(--accent);border-radius:10px;padding:11px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .pausebtn{width:100%;border-radius:11px;padding:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--warn);background:transparent;color:var(--warn);}.pausebtn.paused{background:var(--accent);border-color:var(--accent);color:#0F1115;}
  .resetbtn{width:100%;margin-top:10px;background:none;border:none;color:var(--muted);font-size:11px;text-decoration:underline;cursor:pointer;font-family:inherit;}

/* ===== redesign Week/Setup ===== */

  :root{--bg:#0F1115;--card:#1A1D23;--border:#2A2D35;--muted:#6B7280;--text:#E8EAF0;--accent:#D4F34A;--core:#7DD3FC;--warn:#F59E0B;--sport:#c0a8ff;
    --c-suggest:#7DD3FC;--c-mine:#D4F34A;--c-done:#6B7280;--c-sport:#c0a8ff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:"DM Sans",-apple-system,system-ui,sans-serif;max-width:520px;margin:0 auto;padding:16px 14px calc(env(safe-area-inset-bottom) + 80px);}
  .screen{display:none;}.screen.active{display:block;}
  .logo{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;}
  h1{font-size:21px;font-weight:600;margin:3px 0 2px;}
  .sub{color:var(--muted);font-size:13px;}
  .section-title{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:18px 2px 9px;}
  /* legend */
  .legend{display:flex;gap:14px;margin:12px 0 6px;flex-wrap:wrap;}
  .lg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
  .lgdot{width:10px;height:10px;border-radius:3px;}
  .lgdot.suggest{background:var(--c-suggest);}.lgdot.mine{background:var(--c-mine);}.lgdot.done{background:var(--c-done);}.lgdot.sport{background:var(--c-sport);}
  /* day rows — concrete, legible */
  .day{display:flex;align-items:stretch;gap:0;background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden;cursor:pointer;}
  .day .stripe{width:4px;flex-shrink:0;}
  .day.suggest .stripe{background:var(--c-suggest);}.day.mine .stripe{background:var(--c-mine);}.day.done .stripe{background:var(--c-done);}.day.sport .stripe{background:var(--c-sport);}.day.rest .stripe{background:#2a2d35;}
  .day.today{border-color:var(--accent);}
  .dayinner{flex:1;display:flex;align-items:center;gap:12px;padding:12px 13px;}
  .daydate{flex-shrink:0;width:42px;text-align:center;}
  .daydate .dn{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;}
  .daydate .dd{font-size:18px;font-weight:800;}
  .daymid{flex:1;min-width:0;}
  .daytype{font-size:14px;font-weight:600;}
  .dayreason{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
  .reasontag{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .reasontag.suggest{background:var(--c-suggest);}.reasontag.mine{background:var(--c-mine);}.reasontag.done{background:var(--c-done);}.reasontag.sport{background:var(--c-sport);}.reasontag.rest{background:#3a3d45;}
  .daychev{color:var(--muted);font-size:13px;flex-shrink:0;}
  .daytoday-badge{font-size:9px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;}
  .locki{font-size:11px;color:var(--c-mine);}
  /* action sheet */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:55;}
  .backdrop.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:#161a20;border-top:1px solid var(--border);border-radius:18px 18px 0 0;padding:8px 16px calc(env(safe-area-inset-bottom) + 16px);transform:translateY(110%);transition:transform .25s;z-index:60;max-height:85vh;overflow-y:auto;}
  .sheet.show{transform:translateY(0);}
  .sheet .grab{width:36px;height:4px;background:#3a3d45;border-radius:2px;margin:8px auto 14px;}
  .sheet h3{font-size:16px;font-weight:700;margin-bottom:3px;}
  .sheet .sh-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .act{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#0e1216;border:1px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:8px;font-size:14px;font-weight:600;color:var(--text);font-family:inherit;cursor:pointer;}
  .act .ai{font-size:17px;width:22px;text-align:center;}
  .act .at{flex:1;}.act .ad{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;}
  .act.primary{border-color:var(--accent);}
  .submenu{background:#0c0f13;border:1px solid var(--border);border-radius:11px;padding:6px;margin-bottom:8px;}
  .submenu .smt{font-size:11px;color:var(--muted);padding:6px 8px;}
  .smrow{display:flex;gap:6px;}
  .smrow button{flex:1;background:#161a20;border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  /* change summary toast */
  .summary{position:fixed;left:14px;right:14px;bottom:18px;max-width:492px;margin:0 auto;background:#13201a;border:1px solid #1f3a28;border-radius:13px;padding:13px 15px;transform:translateY(160%);transition:.28s;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.4);}
  .summary.show{transform:translateY(0);}
  .summary .st{font-size:12px;font-weight:700;color:#9fd9a0;margin-bottom:6px;display:flex;justify-content:space-between;}
  .summary .sl{font-size:11.5px;color:#cfd3dc;line-height:1.5;}
  .summary .undo{background:var(--accent);color:#0F1115;border:none;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}
  /* setup */
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:11px;}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
  .prow:first-child{padding-top:0;}.prow:last-child{border-bottom:none;padding-bottom:0;}
  .plbl{font-size:13.5px;font-weight:600;}.pdesc{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .stepper{display:flex;align-items:center;gap:8px;}.stepper button{width:27px;height:27px;border-radius:8px;border:1px solid var(--border);background:#12161c;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;}.stepper .val{font-size:14px;font-weight:700;min-width:18px;text-align:center;}
  .daypills{display:flex;gap:5px;margin-top:10px;}.daypill{flex:1;text-align:center;padding:9px 0;border-radius:9px;border:1px solid var(--border);background:#12161c;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;}.daypill.on{background:var(--accent);color:#0F1115;border-color:var(--accent);}
  /* preview banner */
  .preview{background:#10171d;border:1px solid var(--c-suggest);border-radius:13px;padding:14px;margin-bottom:11px;}
  .preview h4{font-size:13px;font-weight:700;color:var(--c-suggest);margin-bottom:9px;}
  .pvline{font-size:12px;color:#cfd3dc;padding:5px 0;display:flex;gap:8px;align-items:center;line-height:1.4;}
  .pvline .pvd{font-size:10px;color:var(--muted);width:42px;flex-shrink:0;}
  .pvline .arrow{color:var(--muted);}
  .pvbtns{display:flex;gap:8px;margin-top:12px;}
  .pvbtns button{flex:1;border-radius:9px;padding:11px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:#161a20;color:var(--text);}
  .pvbtns button.primary{background:var(--accent);color:#0F1115;border-color:var(--accent);}
  .navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,21,0.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;max-width:520px;margin:0 auto;padding:8px 0 calc(env(safe-area-inset-bottom) + 8px);z-index:40;}
  .navitem{flex:1;text-align:center;font-size:10px;color:var(--muted);font-weight:600;padding:4px;cursor:pointer;}
  .navitem.active{color:var(--accent);}.navitem .ic{font-size:16px;display:block;margin-bottom:2px;}
  .hint{font-size:12px;color:var(--core);background:#10171d;border:1px solid #1c2c38;border-radius:10px;padding:10px 12px;margin:12px 0;line-height:1.45;}
  .switch{width:46px;height:27px;border-radius:20px;background:#33363f;position:relative;transition:.2s;cursor:pointer;flex-shrink:0;}.switch.on{background:var(--accent);}.knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}.switch.on .knob{left:22px;}
  .sportline{display:flex;align-items:center;gap:8px;margin-bottom:9px;}.sportline select{flex:1;background:#12161c;border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px;font-size:13px;font-family:inherit;-webkit-appearance:none;}.sportline .every{font-size:12px;color:var(--muted);}.sportline .del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
  .addsport{width:100%;background:#12161c;border:1px dashed var(--border);color:var(--accent);border-radius:10px;padding:11px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .pausebtn{width:100%;border-radius:11px;padding:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--warn);background:transparent;color:var(--warn);}.pausebtn.paused{background:var(--accent);border-color:var(--accent);color:#0F1115;}
  .toggle-row{display:flex;align-items:center;gap:12px;justify-content:space-between;background:#0c0f13;border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-top:6px;}
  .tg-lbl{font-size:13px;font-weight:700;}.tg-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
</style>

<script>const CORPUS_FULL={"meta": {"version": 1, "note": "Disc-safe exercise library for L4-L5 / L5-S1. Each exercise tagged for rotation by movement pattern. safety: green=always safe, amber=safe with form caveats. stiffDayDrop=true means swap out when back is stiff. compressive=true means axial/compressive spinal load.", "patterns": ["vertical_pull", "horizontal_pull", "vertical_push", "horizontal_push", "hip_hinge", "knee_dominant", "anti_rotation", "anti_extension", "anti_lateral_flexion", "carry", "mobility_reset", "hip_activation", "decompression"], "trustedCreators": ["AskDoctorJo", "Bob and Brad", "Athlean-X", "Squat University", "Yoga With Adriene"], "sessionRules": {"corePlacement": "interleave_as_active_rest", "corePlacementNote": "Core anchors (Dead Bug, Bird-Dog, Side Plank, Pallof) are slotted into rest periods BETWEEN main lifts, never stacked at the start. Sequence flows lift -> core filler -> lift. This reduces dread, shortens perceived session length, and keeps the spine un-fatigued before loading.", "coreAtHomeToggle": true, "coreAtHomeNote": "User can flip 'core at home instead' per session. When on, the gym session omits core fillers and the app flags core to be done at home, logged separately so tracking stays accurate.", "volumeAllocation": "core(anchor,every session) > shoulders/back(engine) > arms + legs(glute/ham-led, ~1 session/wk) > chest(minor) ; mobility woven throughout, concentrated around sport days", "anchorsPlusRotation": "Anchor movements recur weekly for mastery + clean progression tracking; remaining slots rotate from the pool for variety and fresh angles", "progression": "Start user on 'foundation' level moves; introduce 'intermediate'/'advanced' only as consistent sessions are logged", "structure": "Rolling 4-week plan in background -> adjustable Week view -> executable Day view; missed sessions reflow forward and the month rebalances around actual completions", "stiffDayProtocol": "On stiff-back toggle: drop all stiffDayDrop exercises and kettlebell work, swap to supported/low-load variants, expand decompression + McKenzie warm-up, front-load back-reset cool-down, lower intensity (~6/10)", "redFlagRule": "Any pain or tingling radiating down a leg = stop immediately and seek professional assessment", "preSportRule": "Sessions before squash/golf kept ~6/10 effort, mobility/activation emphasis, no heavy loading"}}, "exercises": [{"id": "lat_pulldown_wide", "name": "Wide-Grip Lat Pulldown", "pattern": "vertical_pull", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Lats, mid-back, biceps", "why": "Builds back width with zero spinal load \u2014 you're seated and supported. Strengthening the lats supports better posture, which offloads your lower discs.", "cues": ["Sit tall, thighs locked under pad", "Pull the bar to your upper chest, not behind your neck", "Drive elbows down and back", "Control the bar back up \u2014 no yanking", "Keep your torso nearly upright, minimal lean"], "discNote": "Fully supported seated position. No flexion or compression.", "yt": "lat pulldown proper form Athlean-X", "volumePriority": 2, "level": "foundation"}, {"id": "lat_pulldown_close", "name": "Close-Grip Lat Pulldown", "pattern": "vertical_pull", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Lats, lower lats, biceps", "why": "A neutral close grip hits the lats through a longer range and is easier on the shoulders. Rotating grips keeps the stimulus fresh.", "cues": ["Use the V-handle or close neutral grip", "Sit tall, slight backward lean only", "Pull to your sternum", "Squeeze the back at the bottom", "Slow return"], "discNote": "Seated and supported. Avoid heaving with the lower back.", "yt": "close grip lat pulldown form", "volumePriority": 2, "level": "foundation"}, {"id": "assisted_pullup", "name": "Assisted Pull-Up (Machine)", "pattern": "vertical_pull", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Lats, mid-back, biceps, grip", "why": "The assisted machine lets you train the pull-up pattern with a braced, hanging spine \u2014 gentle decompression actually feels good for the lower back.", "cues": ["Set the assist weight so you get 8-10 clean reps", "Start from a full hang, shoulders engaged", "Pull chest toward the bar", "Control the descent", "Keep core gently braced, don't swing"], "discNote": "Hanging position is slightly decompressive. Avoid kipping or swinging.", "yt": "assisted pull up machine form", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "straight_arm_pulldown", "name": "Straight-Arm Cable Pulldown", "pattern": "vertical_pull", "region": "upper", "equipment": "cable", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Lats (isolation), serratus", "why": "Isolates the lats without bicep involvement and teaches you to feel the back working. Low load, very back-friendly.", "cues": ["Stand tall, slight hip hinge with neutral spine", "Arms straight, push the bar down to your thighs", "Feel the lats, not the triceps", "Hips stay still \u2014 no rocking", "Smooth tempo"], "discNote": "Keep the hinge shallow and the spine neutral; don't round.", "yt": "straight arm pulldown lats form", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "seated_cable_row", "name": "Seated Cable Row (Neutral Grip)", "pattern": "horizontal_pull", "region": "upper", "equipment": "cable", "safety": "amber", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Mid-back, rhomboids, lats, biceps", "why": "The cornerstone horizontal pull for posture and a strong mid-back, which directly protects your lumbar spine by holding you upright.", "cues": ["Sit tall, soft knees, chest up", "Maintain a neutral spine \u2014 do NOT round to reach", "Pull the handle to your belly button", "Squeeze shoulder blades together", "Return under control without rounding forward"], "discNote": "AMBER: safe only if you keep a neutral spine. The risk is rounding/flexing under load on the return. Don't lean way forward to stretch.", "yt": "seated cable row form neutral spine Squat University", "mayfair": true, "volumePriority": 2, "level": "intermediate", "anchor": true}, {"id": "chest_supported_row", "name": "Chest-Supported Machine Row", "pattern": "horizontal_pull", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Mid-back, rhomboids, rear delts", "why": "The chest pad takes your lower back completely out of the equation \u2014 all the rowing benefit, none of the spinal risk. Ideal on stiffer days.", "cues": ["Chest firmly on the pad", "Pull the handles back, elbows toward hips", "Squeeze the shoulder blades", "Don't peel your chest off the pad to move more weight", "Controlled return"], "discNote": "GREEN: chest support removes lumbar load entirely. A top pick for stiff days.", "yt": "chest supported row machine form", "mayfair": true, "volumePriority": 2, "level": "foundation", "anchor": true}, {"id": "single_arm_cable_row", "name": "Single-Arm Cable Row", "pattern": "horizontal_pull", "region": "upper", "equipment": "cable", "safety": "amber", "compressive": false, "stiffDayDrop": false, "golf": true, "muscle": "Lats, mid-back, anti-rotation core", "why": "Rowing one arm at a time forces your core to resist rotation \u2014 a built-in anti-rotation bonus that carries straight into your golf swing stability.", "cues": ["Staggered or square stance, knees soft", "Neutral spine, brace the core", "Row the handle to your hip", "Resist the urge to twist toward the cable", "Control the return without rotating"], "discNote": "AMBER: the anti-rotation demand is the point, but keep hips square and spine neutral.", "yt": "single arm cable row form", "mayfair": true, "volumePriority": 2, "level": "intermediate"}, {"id": "face_pull", "name": "Cable Face Pull", "pattern": "horizontal_pull", "region": "upper", "equipment": "cable", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Rear delts, rotator cuff, mid-traps", "why": "The best insurance for healthy shoulders and upright posture. Strengthens the often-neglected rear shoulder and upper back.", "cues": ["Set cable at face height", "Pull the rope toward your forehead", "Lead with the elbows, high and wide", "Externally rotate at the end \u2014 thumbs back", "Light weight, high reps"], "discNote": "Standing tall, no spinal load. Keep ribs down, don't arch.", "yt": "face pull form rear delts Athlean-X", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "machine_chest_press", "name": "Machine Chest Press", "pattern": "horizontal_push", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Chest, front delts, triceps", "why": "Builds the chest with full back support against the pad \u2014 the seated machine version removes the spinal stress of a barbell bench.", "cues": ["Back flat against the pad", "Handles at mid-chest height", "Press without flaring elbows past 75 degrees", "Don't arch the lower back to push more", "Control the negative"], "discNote": "GREEN: back fully supported. Keep the lower back against the pad \u2014 don't bridge.", "yt": "machine chest press proper form", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "cable_chest_press", "name": "Standing Cable Chest Press", "pattern": "horizontal_push", "region": "upper", "equipment": "cable", "safety": "amber", "compressive": false, "stiffDayDrop": true, "golf": true, "muscle": "Chest, front delts, core", "why": "Pressing while standing adds an anti-rotation and core-bracing challenge. Good for athletic carryover, but demands more spinal control.", "cues": ["Split stance, brace hard", "Press handles forward together", "Keep ribs down, don't arch", "Core stays tight throughout", "Slow return resisting the pull back"], "discNote": "AMBER + stiff-day swap: the standing brace is more demanding. On stiff days use the machine chest press instead.", "yt": "standing cable chest press form", "mayfair": true, "volumePriority": 2, "level": "advanced"}, {"id": "incline_machine_press", "name": "Incline Machine Press", "pattern": "horizontal_push", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Upper chest, front delts, triceps", "why": "Targets the upper chest for a fuller look, still fully supported. Rotating press angles keeps the chest developing evenly.", "cues": ["Back and head against the pad", "Press up and slightly in", "Don't let the lower back arch off the seat", "Full but controlled range", "Squeeze at the top"], "discNote": "GREEN: supported seated incline. No lumbar load.", "yt": "incline machine press form", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "pec_deck", "name": "Pec Deck / Machine Fly", "pattern": "horizontal_push", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Chest (isolation)", "why": "Isolates the chest through a big stretch and squeeze with total back support. A joint-friendly way to add chest volume.", "cues": ["Back flat on the pad", "Slight bend in the elbows, hold it", "Bring the pads together in front of the chest", "Squeeze, then control the stretch back", "Don't overstretch the shoulders"], "discNote": "GREEN: seated and supported.", "yt": "pec deck machine fly form", "mayfair": true, "volumePriority": 4, "level": "foundation"}, {"id": "machine_shoulder_press", "name": "Machine Shoulder Press", "pattern": "vertical_push", "region": "upper", "equipment": "machine", "safety": "amber", "compressive": true, "stiffDayDrop": false, "golf": false, "muscle": "Shoulders, upper traps, triceps", "why": "Overhead pressing builds shoulder strength and size \u2014 the machine version guides the path and supports your back, but overhead loading still transmits some compression.", "cues": ["Seat height so handles start at ear level", "Press straight up without arching the lower back", "Lower until elbows reach about 90 degrees", "Keep the core braced", "If your back arches, lighten the load"], "discNote": "AMBER: overhead = some axial load. Safe IF you don't arch. Brace and keep ribs down.", "yt": "machine shoulder press form no back arch", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "cable_lateral_raise", "name": "Cable Lateral Raise", "pattern": "vertical_push", "region": "upper", "equipment": "cable", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Side delts (isolation)", "why": "Builds shoulder width \u2014 broader shoulders make your waist look smaller, supporting your upper-body reshape goal. No overhead compression.", "cues": ["Stand tall, cable behind you", "Raise the arm out to the side to shoulder height", "Lead with the elbow, slight bend", "No shrugging or swinging", "Control down"], "discNote": "GREEN: standing tall, light load, no spinal stress.", "yt": "cable lateral raise form", "mayfair": true, "volumePriority": 2, "level": "foundation", "anchor": true}, {"id": "machine_lateral_raise", "name": "Machine Lateral Raise", "pattern": "vertical_push", "region": "upper", "equipment": "machine", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Side delts (isolation)", "why": "Fixed path makes it easy to feel the side delts with zero balance or spinal demand. Great alternative when the cable station is busy.", "cues": ["Adjust seat so pivot aligns with shoulders", "Pads against the outer arms", "Raise to shoulder height", "Pause briefly", "Lower slowly"], "discNote": "GREEN: seated and supported.", "yt": "machine lateral raise form", "mayfair": true, "volumePriority": 2, "level": "foundation", "anchor": true}, {"id": "tricep_pushdown", "name": "Cable Tricep Pushdown", "pattern": "horizontal_push", "region": "upper", "equipment": "cable", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Triceps", "why": "Strong triceps round out arm and pressing strength. A simple, low-risk standing isolation.", "cues": ["Stand tall, elbows pinned to your sides", "Push the bar or rope down to lockout", "Keep elbows still \u2014 only the forearms move", "Squeeze the triceps at the bottom", "Control back up"], "discNote": "GREEN: brace lightly, don't lean over the weight.", "yt": "tricep pushdown form", "mayfair": true, "volumePriority": 3, "level": "foundation"}, {"id": "cable_bicep_curl", "name": "Cable Bicep Curl", "pattern": "horizontal_pull", "region": "upper", "equipment": "cable", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Biceps", "why": "Constant cable tension builds the biceps through the full range. Low-risk arm work to finish an upper day.", "cues": ["Stand tall, elbows at your sides", "Curl the bar up", "No swinging or using the back", "Squeeze at the top", "Lower slowly"], "discNote": "GREEN: keep the torso still; don't swing from the hips/back.", "yt": "cable bicep curl form", "mayfair": true, "volumePriority": 2, "level": "foundation"}, {"id": "leg_press", "name": "Leg Press (Machine)", "pattern": "knee_dominant", "region": "lower", "equipment": "machine", "safety": "amber", "compressive": false, "stiffDayDrop": false, "golf": false, "muscle": "Quads, glutes, hamstrings", "why": "All the leg-building benefit of a squat with your back supported against the pad \u2014 no axial spinal load. Builds leg drive for golf and squash.", "cues": ["Back and hips flat against the pad", "Feet shoulder-width, mid-platform", "Lower until EN: seated and supported. A safe triceps builder.", "yt": "seated dip machine triceps form", "volumePriority": 2, "level": "foundation"}, {"id": "ninety_ninety_hip", "name": "90/90 Hip Switch", "pattern": "mobility_reset", "region": "lower", "equipment": "bodyweight", "safety": "green", "compressive": false, "stiffDayDrop": false, "golf": true, "muscle": "Hip rotation mobility", "why": "Opens up internal and external hip rotation \u2014 the mobility that lets your hips do the turning in a golf swing so your lower back doesn't have to. Directly targets your post-sport stiffness at the source.", "cues": ["Sit with both knees bent at 90 degrees, one in front, one to the side", "Keep the chest tall", "Rotate the knees to switch sides", "Move slowly, stay upright", "Go only as far as comfortable"], "discNote": "GREEN: seated hip mobility, spine stays tall and neutral. Excellent for golfers.", "yt": "90 90 hip switch mobility form", "volumePriority": 4, "level": "foundation"}]};</script>
<script>/* ============================================================
   SpineStrong Engine — single source of truth + session generator
   Reads exercises.json corpus + sessionRules. Persists to localStorage.
   Views (Today / Week / Dashboard) all read from this.
   ============================================================ */

const SS = (function(){
  const LS_KEY = 'spinestrong_v1';
  let CORPUS = [];      // 87 exercises
  let RULES = {};       // meta.sessionRules
  let BYID = {};

  // ---- DATA MODEL (persisted) ----
  // model = { startDate, plan:[{date, type, status, sessionId}], log:{sessionId:{...}}, prefs:{} }
  let model = null;

  function todayISO(d){ d=d||new Date(); return d.toISOString().slice(0,10); }
  function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return todayISO(d); }
  function dow(iso){ return new Date(iso+'T00:00:00').getDay(); } // 0=Sun

  // Day-type rotation: 3 flexible days/week. Default Upper / Lower / Upper.
  // Each day has SLOTS — ordered recipes that pull a specific kind of exercise, so the
  // important builders (shoulder press, rows, arms) always land where they belong.
  // slot: {role, pattern(s), region, prefer:[ids], avoid:[ids]} — first eligible match wins.
  const DAY_TYPES = {
    upper_a: { name:'Upper Body — Shoulders & Back', effort:7, slots:[
      {role:'Vertical pull',   patterns:['vertical_pull'],   prefer:['lat_pulldown_wide','assisted_pullup']},
      {role:'Horizontal pull (anchor)', patterns:['horizontal_pull'], prefer:['chest_supported_row','seated_cable_row'], anchor:true},
      {role:'Shoulder press',  patterns:['vertical_push'],    prefer:['machine_shoulder_press']},
      {role:'Lateral raise (width)', patterns:['vertical_push'], prefer:['cable_lateral_raise','machine_lateral_raise'], region:'shoulders'},
      {role:'Rear delt / upper back', patterns:['horizontal_pull'], prefer:['face_pull','machine_rear_delt','band_pull_apart']}
    ]},
    upper_b: { name:'Upper Body — Push & Arms', effort:7, slots:[
      {role:'Horizontal push',  patterns:['horizontal_push'], prefer:['machine_chest_press','incline_machine_press']},
      {role:'Shoulder press',   patterns:['vertical_push'],   prefer:['machine_shoulder_press']},
      {role:'Lateral raise (width)', patterns:['vertical_push'], prefer:['machine_lateral_raise','cable_lateral_raise']},
      {role:'Biceps',           patterns:['horizontal_pull'], prefer:['cable_bicep_curl','hammer_curl_cable']},
      {role:'Triceps',          patterns:['vertical_push','horizontal_push'], prefer:['tricep_pushdown','overhead_tricep_cable']}
    ]},
    lower: { name:'Lower — Glute & Hamstring', effort:6, slots:[
      {role:'Glute press (anchor)', patterns:['hip_hinge','hip_activation'], prefer:['glute_press_machine'], anchor:true},
      {role:'Hamstring',        patterns:['hip_hinge'],       prefer:['lying_leg_curl','seated_calf_machine']},
      {role:'Hip thrust',       patterns:['hip_hinge','hip_activation'], prefer:['hip_thrust_machine','glute_bridge']},
      {role:'Hip abduction',    patterns:['hip_activation'],  prefer:['hip_abductor_machine','glute_activation_clamshell']},
      {role:'Knee / quad (light)', patterns:['knee_dominant'], prefer:['leg_press','leg_extension']}
    ]},
    presport: { name:'Pre-Sport — Mobility & Activation', effort:5, slots:[
      {role:'Decompression',    patterns:['decompression','mobility_reset'], prefer:['standing_decompression','cat_cow']},
      {role:'Hip mobility',     patterns:['mobility_reset'],  prefer:['hip_flexor_stretch','ninety_ninety_hip','world_greatest_stretch']},
      {role:'Glute activation', patterns:['hip_activation'],  prefer:['glute_activation_clamshell','glute_bridge']},
      {role:'Thoracic',         patterns:['mobility_reset'],  prefer:['thoracic_rotation','open_book']}
    ]}
  };
  const WEEK_TEMPLATE = ['upper_a','lower','upper_b'];

  function init(corpus, rules){
    CORPUS = corpus; RULES = rules||{};
    BYID = {}; corpus.forEach(e=>BYID[e.id]=e);
    load();
    if(!model) seed();
    return SS;
  }

  function seed(){
    const start = todayISO();
    model = {
      startDate:start,
      log:{},                    // {sessionId:{date,type,weights,setsDone,exercises}}
      overrides:{},              // {date:{skip|busy|move|sport|type}}
      rotationCursor:0,
      prefs:{
        level:'foundation',
        sessionsPerWeek:3,
        preferredDays:[1,3,5],   // 0=Sun..6=Sat
        minRestDays:1,
        recurringSports:[],      // [{sport:'squash', day:2}]
        noTrainDayBeforeSport:true,
        easeInOnReturn:true,
        paused:false,
        pausedAt:null
      }
    };
    save();
  }

  // ---- FORWARD-REGENERATING PLAN ----
  // Plan is generated forward from a date, honoring rhythm (sessionsPerWeek, preferredDays,
  // minRest), recurring sports, day-before-sport rule, and per-date overrides.
  function buildPlan(fromISO, days){
    fromISO = fromISO || todayISO();
    days = days || 28;
    const p = model.prefs;
    const out = [];
    const today = todayISO();
    const sportByDow = {};
    (p.recurringSports||[]).forEach(rs=>{ sportByDow[rs.day]=rs.sport; });

    let lastTrain = null, weekKey=null, weekCount=0;
    let cursor = model.rotationCursor||0;

    for(let i=0;i<days;i++){
      const date = addDays(fromISO, i);
      const wd = dow(date);
      const wk = isoWeek(date);
      if(wk!==weekKey){ weekKey=wk; weekCount=0; }

      const ov = model.overrides[date] || {};
      const sport = ov.sport || sportByDow[wd] || null;
      const sportSource = ov.sport ? 'one-off' : (sportByDow[wd] ? 'recurring' : null);
      const logged = Object.values(model.log).find(s=>s.date===date);

      if(p.paused && date>=(p.pausedAt||today) && date<=today){
        out.push({date,type:'rest',status:'paused',sport,source:'paused',reason:'Plan paused'}); continue;
      }
      if(ov.skip || ov.busy){
        out.push({date,type:'rest',status:date<today?'skipped':'busy',sport,note:ov.busy?'busy':'skipped',
          source:'user', reason: ov.busy?'You marked this day busy':'You skipped this day'}); continue;
      }
      if(logged){
        out.push({date,type:logged.type,status:'done',sport,sessionId:logged.sessionId||null,
          source:'done', reason:'Completed — locked in your history'});
        if(date<=today){ lastTrain=date; weekCount++; cursor++; }
        continue;
      }
      if(date<today){ out.push({date,type:'rest',status:'gap',sport,source:'gap',reason:'Missed — not yet done'}); continue; }

      // pinned session (your manual choice — the generator builds around it)
      if(ov.pin){
        out.push({date,type:ov.pin,status:'scheduled',sport,pinned:true,
          oneOff: ov.oneOff||false,
          source:'user', reason: ov.movedFrom?('Moved here from '+shortDate(ov.movedFrom)):'You placed this session here'});
        lastTrain=date; weekCount++;
        // a one-off (toggle OFF) does NOT advance the rotation sequence; a normal placed
        // session (toggle ON) advances it so following days continue correctly.
        if(!ov.oneOff){
          // align cursor: if this pin matches the expected next type, just advance;
          // if user picked a different type, resync cursor to continue AFTER this type.
          const expected = WEEK_TEMPLATE[cursor%WEEK_TEMPLATE.length];
          if(ov.pin!==expected){
            const idx=WEEK_TEMPLATE.indexOf(ov.pin);
            if(idx>=0) cursor=idx; // resync to this type's position
          }
          cursor++;
        }
        continue;
      }

      // future: decide train vs rest
      const isPreferred=(p.preferredDays||[]).includes(wd);
      const underTarget=weekCount<(p.sessionsPerWeek||3);
      const restOk=!lastTrain || daysBetween(lastTrain,date)>=(p.minRestDays||1);
      let dayBeforeSport=false;
      if(p.noTrainDayBeforeSport){
        const tm=addDays(date,1), tDow=dow(tm), tOv=model.overrides[tm]||{};
        if(tOv.sport||sportByDow[tDow]) dayBeforeSport=true;
      }
      if(sport){
        out.push({date,type:'rest',status:'rest',sport,source:'sport',
          reason: sportSource==='recurring'?('Recurring '+sport+' day'):(sport+' this day')});
      } else if(isPreferred && underTarget && restOk && !dayBeforeSport){
        const type=ov.type || WEEK_TEMPLATE[cursor%WEEK_TEMPLATE.length];
        out.push({date,type,status:'scheduled',sport,source:'rhythm',reason:'Planned from your rhythm'});
        lastTrain=date; weekCount++; cursor++;
      } else {
        let reason='Rest day';
        if(dayBeforeSport) reason='Rest — kept light before sport';
        else if(!isPreferred) reason='Not one of your training days';
        else if(!restOk) reason='Rest — spacing your training days';
        else if(!underTarget) reason='Rest — hit your weekly target';
        out.push({date,type:'rest',status:'rest',sport,source:'rhythm',reason});
      }
    }
    return out;
  }
  function isoWeek(iso){const d=new Date(iso+'T00:00:00');const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10);}
  function daysBetween(a,b){return Math.abs(Math.round((new Date(b)-new Date(a))/86400000));}
  function shortDate(iso){const d=new Date(iso+'T00:00:00');return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+d.getDate();}
  function daysSinceLastSession(){const ds=Object.values(model.log).map(s=>s.date).sort();return ds.length?daysBetween(ds[ds.length-1],todayISO()):null;}
  function returningFromLayoff(){const g=daysSinceLastSession();return g!=null&&g>=10;}

  // ---- SESSION GENERATOR ----
  // Build a concrete session (list of exercise ids w/ prescription) for a day type.
  function pick(filterFn, n, exclude){
    exclude=exclude||new Set();
    const pool=CORPUS.filter(e=>filterFn(e)&&!exclude.has(e.id));
    return pool.slice(0,n);
  }

  function restFor(e){
    if(e.region==='core') return 45;
    if(['vertical_push','hip_hinge','knee_dominant'].includes(e.pattern)) return 90;
    if(['horizontal_pull','horizontal_push'].includes(e.pattern)) return 75;
    return 60;
  }
  function repsFor(e){
    if(e.region==='core') return (e.pattern==='anti_lateral_flexion'||e.id==='bird_dog')?'8/side':'10';
    if(e.volumePriority>=3) return '12';
    return '10';
  }

  function generateSession(type, opts){
    opts=opts||{};
    const level = model.prefs.level||'foundation';
    const stiff = opts.stiff||false;
    const dt = DAY_TYPES[type];
    if(!dt) return null;
    const used=new Set();

    // level gate
    const levelOk = e => {
      if(level==='foundation') return e.level==='foundation';
      if(level==='intermediate') return e.level!=='advanced';
      return true;
    };
    // stiff-day: drop compressive + stiffDayDrop + kettlebell, green only
    const stiffOk = e => !stiff || (!e.stiffDayDrop && !(e.equipment||'').toLowerCase().includes('kettlebell') && e.safety==='green');
    const eligible = e => levelOk(e) && stiffOk(e);

    // SLOT-BASED selection: fill each slot with its best available match.
    // Tries prefer[] in order, then any eligible exercise matching the slot's patterns.
    const lifts=[];
    (dt.slots||[]).forEach(slot=>{
      let chosen=null;
      // 1) try preferred ids in order
      for(const pid of (slot.prefer||[])){
        const e=BYID[pid];
        if(e && eligible(e) && !used.has(pid)){ chosen=e; break; }
      }
      // 2) fall back to any eligible exercise in the slot's patterns (by volume priority)
      if(!chosen){
        const pool=CORPUS.filter(e=> (slot.patterns||[]).includes(e.pattern)
          && e.region!=='core' && eligible(e) && !used.has(e.id))
          .sort((a,b)=>a.volumePriority-b.volumePriority);
        if(pool.length) chosen=pool[0];
      }
      if(chosen){ lifts.push(chosen); used.add(chosen.id); }
    });

    // 3) Core anchors to interleave (McGill Big 3 + Pallof), unless "core at home"
    const coreAnchors = CORPUS.filter(e=>e.anchor && e.region==='core' && levelOk(e) && stiffOk(e));
    const coreToUse = opts.coreAtHome ? [] : coreAnchors.slice(0,4);

    // 4) Interleave: lift, core, lift, core...
    const mainLifts = lifts.filter(x=>x.region!=='core');
    const seq=[];
    let ci=0;
    mainLifts.forEach((lift,i)=>{
      seq.push(lift);
      if(ci<coreToUse.length && i<mainLifts.length-0){ seq.push(coreToUse[ci]); ci++; }
    });
    while(ci<coreToUse.length){ seq.push(coreToUse[ci]); ci++; }

    // ease-in after a layoff: lighter load + fewer sets (back-safe)
    const easeIn = opts.easeIn!=null ? opts.easeIn : (model.prefs.easeInOnReturn && returningFromLayoff());

    // 5) build prescription per exercise
    const items = seq.map(e=>{
      // weighted if it uses a cable/machine/weight; bodyweight (null) only for true BW moves
      const eq=(e.equipment||'').toLowerCase();
      const isWeighted = /cable|machine|kettlebell|weight|band|dumbbell/.test(eq);
      let w = isWeighted ? suggestWeight(e.id) : null;
      if(easeIn && w!=null) w = Math.max(5, Math.round((w*0.8)/5)*5);
      return {
        id:e.id, name:e.name, muscle:e.muscle||'', isCore:e.region==='core',
        equipment:e.equipment||'', pattern:e.pattern, safety:e.safety, disc:e.discNote||'',
        cues:e.cues||[], why:e.why||'', yt:(e.yt||'').replace(/ /g,'+'),
        rx:{ sets: easeIn?2:3, reps:repsFor(e), tempo:'2-1-2', rest:restFor(e), weight:w }
      };
    });

    let name = stiff?dt.name+' — Stiff-Day':dt.name;
    if(easeIn) name = dt.name+' — Ease Back In';
    return { type, name, effort: stiff?6:(easeIn?5:dt.effort),
             stiff, easeIn, coreAtHome:!!opts.coreAtHome, items };
  }

  // progression: last logged weight, or baseline
  const BASELINES = {seated_cable_row:45,machine_shoulder_press:35,cable_bicep_curl:50,tricep_pushdown:30,
    chest_supported_row:45,machine_lateral_raise:15,lat_pulldown_wide:60,lat_pulldown_close:65,leg_press:135,
    cable_lateral_raise:12,machine_chest_press:50,seated_row_wide:50,
    pallof_press:25,pallof_overhead:20,cable_chop:25,cable_lift:25,cable_woodchop_high_low:25,
    hip_thrust_machine:90,glute_press_machine:90,lying_leg_curl:50,leg_extension:50,
    machine_rear_delt:30,hammer_curl_cable:25,overhead_tricep_cable:25,incline_machine_press:45,
    hip_abductor_machine:60,hip_adductor_machine:60,seated_calf_machine:90,pec_deck:50};
  function suggestWeight(id){
    // find most recent log entry with this exercise
    const entries=Object.values(model.log).filter(s=>s.weights&&s.weights[id]!=null)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if(entries.length) return entries[0].weights[id];
    return BASELINES[id]!=null?BASELINES[id]:null;
  }

  // ---- SCHEDULING CONTROLS (override-based) ----
  function setOverride(date, patch){ model.overrides[date]=Object.assign({},model.overrides[date],patch); save(); }
  function clearOverride(date){ delete model.overrides[date]; save(); }
  function skipDay(date){ setOverride(date,{skip:true}); }
  function markBusy(date){ setOverride(date,{busy:true}); }
  function markSport(date,sport){ if(sport) setOverride(date,{sport}); else { const o=model.overrides[date]||{}; delete o.sport; model.overrides[date]=o; save(); } }
  function getTypeFor(date){ const pl=buildPlan(date,1); return pl[0]?pl[0].type:null; }

  // what session type comes next in the rotation right now
  function nextRotationType(){ return WEEK_TEMPLATE[(model.rotationCursor||0)%WEEK_TEMPLATE.length]; }

  // INSERT a session of `type` on `date`. 
  //  cascadeForward=true (default): pin it as part of the rotation; the generator recomputes
  //    the whole forward plan coherently (rotation continues correctly, weekly counts respected).
  //  cascadeForward=false: a one-off bonus session that does NOT shift the rotation sequence.
  function insertSession(date, type, cascadeForward){
    cascadeForward = cascadeForward!==false; // default true
    if(cascadeForward){
      // Pin as a real rotation session. Because the generator derives the cursor from placed
      // sessions in order, everything after this naturally re-sequences. To keep the weekly
      // count steady, drop the LAST scheduled session of the same ISO week (push it forward
      // organically by just removing its preferred slot — generator will re-place forward).
      setOverride(date,{pin:type, userPlaced:true});
    } else {
      setOverride(date,{pin:type, userPlaced:true, oneOff:true});
    }
    save();
  }

  // MOVE JUST THIS ONE session forward N days, keeping its type. Original day becomes skipped,
  // target day gets pinned to that session type (forces a training day there).
  function pushSessionForward(date, days){
    const t=getTypeFor(date);
    if(!t || t==='rest') return;
    const target=addDays(date,days);
    setOverride(date,{skip:true});
    setOverride(target,{pin:t, movedFrom:date});   // pin + remember origin for the reason text
  }

  // Compute a human-readable diff between the current plan and a proposed one (for preview-before-apply).
  // proposedPrefs: a prefs patch to simulate. Returns array of {date, before, after, reason}.
  function previewPrefsChange(prefsPatch, windowDays){
    windowDays=windowDays||14;
    const from=todayISO();
    const before=buildPlan(from,windowDays);
    const saved=JSON.stringify(model.prefs);
    model.prefs=Object.assign({},model.prefs,prefsPatch);
    const after=buildPlan(from,windowDays);
    model.prefs=JSON.parse(saved);   // restore — do NOT apply yet
    const diffs=[];
    before.forEach((b,i)=>{
      const a=after[i];
      const bLabel=b.type==='rest'?(b.sport?b.sport:'Rest'):b.type;
      const aLabel=a.type==='rest'?(a.sport?a.sport:'Rest'):a.type;
      if(bLabel!==aLabel){ diffs.push({date:b.date, before:bLabel, after:aLabel, reason:a.reason}); }
    });
    return diffs;
  }

  // PUSH THE WHOLE CHAIN forward N days from `date`: this session and every scheduled
  // session after it (in the upcoming window) each slide forward N days, preserving order.
  function pushChainForward(date, days){
    // capture upcoming scheduled sessions AND their types BEFORE any mutation
    const upcoming=buildPlan(date,28).filter(p=>p.type!=='rest' && p.status!=='done' && p.date>=date);
    const moves=upcoming.map(p=>({from:p.date, type:p.type}));   // type read from clean plan
    if(!moves.length) return;
    // now skip all originals
    moves.forEach(m=>{ setOverride(m.from,{skip:true}); });
    // then pin each shifted forward N days (skip if target already busy/skipped)
    moves.forEach(m=>{ const tgt=addDays(m.from,days); const ov=model.overrides[tgt]||{}; if(!ov.skip && !ov.busy){ setOverride(tgt,{pin:m.type}); } });
    save();
  }

  // recent skips (neutral info)
  function recentSkips(){
    const start=addDays(todayISO(),-14);
    return buildPlan(start,15).filter(p=>p.date<todayISO() && (p.status==='gap'||p.status==='skipped'));
  }

  function pausePlan(){ model.prefs.paused=true; model.prefs.pausedAt=todayISO(); save(); }
  function resumePlan(){ model.prefs.paused=false; model.prefs.pausedAt=null; save(); }
  function setPrefs(patch){ model.prefs=Object.assign({},model.prefs,patch); save(); }
  function addRecurringSport(sport,day){ model.prefs.recurringSports=model.prefs.recurringSports||[]; model.prefs.recurringSports.push({sport,day:+day}); save(); }
  function removeRecurringSport(i){ model.prefs.recurringSports.splice(i,1); save(); }

  // log a completed session (plan is derived, so we only store the log + advance cursor)
  function logSession(type, items, opts){
    opts=opts||{};
    const id='s_'+Date.now();
    const date=opts.date||todayISO();
    const weights={}, setsDone={};
    items.forEach(it=>{ if(it._weight!=null) weights[it.id]=it._weight; setsDone[it.id]=(it._sets||[]).filter(Boolean).length; });
    model.log[id]={date,type,weights,setsDone,exercises:items.map(i=>i.id),sessionId:id};
    model.rotationCursor=(model.rotationCursor||0)+1;
    save();
    return id;
  }

  // ---- DASHBOARD DATA ----
  function stats(){
    const sessions=Object.values(model.log);
    const total=sessions.length;
    const last30=sessions.filter(s=>s.date>=addDays(todayISO(),-30));
    // weight-over-time per exercise
    const byEx={};
    sessions.forEach(s=>{ Object.entries(s.weights||{}).forEach(([id,w])=>{ (byEx[id]=byEx[id]||[]).push({date:s.date,w}); }); });
    // streak: consecutive scheduled days done
    return { totalSessions:total, last30:last30.length, byExercise:byEx,
             planAdherence: adherence() };
  }
  function adherence(){
    const start=addDays(todayISO(),-28);
    const past=buildPlan(start,29).filter(p=>p.date<=todayISO());
    const opps=past.filter(p=>['done','gap','skipped','scheduled'].includes(p.status));
    if(!opps.length) return 0;
    const done=past.filter(p=>p.status==='done').length;
    return Math.round(100*done/opps.length);
  }

  // ---- persistence ----
  function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(model)); }catch(e){} }
  function load(){ try{ const r=localStorage.getItem(LS_KEY); model=r?JSON.parse(r):null; }catch(e){ model=null; } }
  function exportData(){ return JSON.stringify(model); }
  function importData(json){ try{ model=JSON.parse(json); save(); return true; }catch(e){ return false; } }
  function reset(){ model=null; localStorage.removeItem(LS_KEY); seed(); }

  return { init, generateSession, logSession, stats, adherence,
           exportData, importData, reset,
           // forward plan
           buildPlan, getPlan(d,n){return buildPlan(d,n);},
           getToday(){ const t=todayISO(); return buildPlan(t,1)[0]; },
           // scheduling controls
           setOverride, clearOverride, skipDay, markBusy, markSport, getTypeFor,
           nextRotationType, insertSession,
           pushSessionForward, pushChainForward, previewPrefsChange,
           recentSkips, pausePlan, resumePlan,
           setPrefs, addRecurringSport, removeRecurringSport,
           // layoff
           daysSinceLastSession, returningFromLayoff,
           get model(){return model;}, get corpus(){return CORPUS;}, get prefs(){return model.prefs;},
           DAY_TYPES, todayISO, addDays, dow };
})();

if(typeof module!=='undefined') module.exports=SS;
</script>

function autoSave(){

  const weights={},setsDone={};
  currentSession.items.forEach(it=>{if(it._weight!=null)weights[it.id]=it._weight;setsDone[it.id]=(it._sets||[]).filter(Boolean).length;});

    const[id]=existing;
    SS.model.log[id]=Object.assign(SS.model.log[id],{weights,setsDone,exercises:currentSession.items.filter(it=>it._done).map(it=>it.id)});

    SS.logSession(currentSession._type,currentSession.items.filter(it=>it._done||(it._sets||[]).some(Boolean)||it._weight!=null));

}
function startTimer(i){const c=currentSession.items[i];if(timers[i]==null)timers[i]=c.rx.rest;clearInterval(intervals[i]);

function renderProgress(){

      <div class="heat"><div class="ht">Last 14 days</div><div class="heatgrid">${heatCells()}</div></div></div>
    <div class="statgrid"><div class="stat accent"><div class="v">${n}</div><div class="l">Sessions</div></div>
      <div class="stat"><div class="v">${st.last30}</div><div class="l">Last 30d</div></div>

    <div class="backcard"><div class="shield">🛡️</div><div><div class="bt">Disc anchors hit ${withCore}/${n} sessions</div><div class="bs">Your McGill Big 3 + Pallof in every session — spine protected as planned.</div></div></div>
